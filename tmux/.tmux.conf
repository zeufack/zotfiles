# General
set  -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set  -g mouse on
set  -g base-index 1
setw -g pane-base-index 1
set  -g renumber-windows on
set  -g history-limit 50000
set  -g escape-time 0
set  -g focus-events on
set  -g set-clipboard on
set  -g allow-passthrough on
setw -g aggressive-resize on
set  -g detach-on-destroy off

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
bind-key -n M-H previous-window
bind-key -n M-L next-window

# Navigate using vim shortcuts
setw -g mode-keys vi

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Reload
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# Vi-style visual select + yank in copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Splits / new windows inherit current path
bind '\' split-window -h -c "#{pane_current_path}"
bind -  split-window -v -c "#{pane_current_path}"
bind c  new-window    -c "#{pane_current_path}"
unbind '"'
unbind %

# Editor layout: nvim in current pane, 20%-tall shell pane below.
bind-key e split-window -v -l 20% -c "#{pane_current_path}" \; \
           select-pane -U \; \
           send-keys "nvim ." Enter



# List of plugins
set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin "nordtheme/tmux"

# set tmux-menu to help managing environment
set -g @plugin 'jaclu/tmux-menus'

# set tmux nerd font window name 
# set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'

# set tmux nord theme
 set -g @plugin "nordtheme/tmux"

# set nvim navigator.
set -g @plugin 'christoomey/vim-tmux-navigator'

# fzf-tmux plugin
set -g @plugin 'sainnhe/tmux-fzf'

# fzf keybindings
bind-key f run-shell "tmux-fzf"


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
